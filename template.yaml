AWSTemplateFormatVersion: '2010-09-09'
Description: 'Cloud Computing Project 1: Anomaly Detection Pipeline'

Parameters:
  MyIP:
    Type: String
    Description: 'IP address to allow SSH/HTTP access (e.g., 0.0.0.0/0)'
    Default: '0.0.0.0/0'

Resources:
  # 1. S3 Bucket for Data
  DataBucket:
    Type: 'AWS::S3::Bucket'
    Properties:
      BucketName: !Sub 'ds5220-project1-data-${AWS::AccountId}'
      NotificationConfiguration:
        TopicConfigurations:
          - Topic: !Ref AnomalySnsTopic
            Event: 's3:ObjectCreated:*'
            Filter:
              S3Key:
                Rules:
                  - Name: prefix
                    Value: raw/
                  - Name: suffix
                    Value: .csv

  # 2. SNS Topic for Notifications
  AnomalySnsTopic:
    Type: 'AWS::SNS::Topic'
    Properties:
      TopicName: ds5220-dp1

  # 3. Allow S3 to publish to the SNS Topic
  SnsTopicPolicy:
    Type: 'AWS::SNS::TopicPolicy'
    Properties:
      Topics: [!Ref AnomalySnsTopic]
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: s3.amazonaws.com
            Action: sns:Publish
            Resource: !Ref AnomalySnsTopic
            Condition:
              ArnLike:
                aws:SourceArn: !Sub 'arn:aws:s3:::ds5220-project1-data-${AWS::AccountId}'

  # 4. IAM Role for EC2
  EC2InstanceRole:
    Type: 'AWS::IAM::Role'
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: 'sts:AssumeRole'
      Policies:
        - PolicyName: AnomalyAppPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: ['s3:*']
                Resource: 
                  - !Sub 'arn:aws:s3:::ds5220-project1-data-${AWS::AccountId}'
                  - !Sub 'arn:aws:s3:::ds5220-project1-data-${AWS::AccountId}/*'
              - Effect: Allow
                Action: ['sns:Subscribe', 'sns:ConfirmSubscription']
                Resource: !Ref AnomalySnsTopic

  InstanceProfile:
    Type: 'AWS::IAM::InstanceProfile'
    Properties:
      Roles: [!Ref EC2InstanceRole]

  # 5. Security Group
  AnomalySecurityGroup:
    Type: 'AWS::EC2::SecurityGroup'
    Properties:
      GroupDescription: Allow HTTP 8000 and SSH
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 8000
          ToPort: 8000
          CidrIp: !Ref MyIP
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref MyIP

  # 6. EC2 Instance
  AnomalyEC2Instance:
    Type: 'AWS::EC2::Instance'
    Properties:
      InstanceType: t3.micro
      ImageId: ami-04b70fa74e45c3917 # Ubuntu 24.04 LTS
      IamInstanceProfile: !Ref InstanceProfile
      SecurityGroupIds: [!Ref AnomalySecurityGroup]
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          exec > /var/log/user-data.log 2>&1
          
          # Set Environment Variables
          echo "BUCKET_NAME=ds5220-project1-data-${AWS::AccountId}" >> /etc/environment
          export BUCKET_NAME=ds5220-project1-data-${AWS::AccountId}

          # Install Dependencies
          apt-get update -y
          apt-get install -y git python3-pip python3-venv

          # App Setup
          cd /home/ubuntu
          git clone https://github.com/yani-iben/ds5220-data-project-1 app
          cd app
          python3 -m venv venv
          ./venv/bin/pip install -r requirements.txt
          
          # Start FastAPI
          ./venv/bin/python3 -m uvicorn app:app --host 0.0.0.0 --port 8000 &

  # 7. SNS Subscription to EC2
  EC2Subscription:
    Type: 'AWS::SNS::Subscription'
    Properties:
      TopicArn: !Ref AnomalySnsTopic
      Protocol: http
      Endpoint: !Sub 'http://${AnomalyEC2Instance.PublicIp}:8000/notify'

Outputs:
  InstancePublicIP:
    Value: !GetAtt AnomalyEC2Instance.PublicIp
  S3BucketName:
    Value: !Ref DataBucket